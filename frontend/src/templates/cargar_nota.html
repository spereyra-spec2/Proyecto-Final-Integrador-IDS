{% extends "base.html" %}

{% block content %}
<div class="public-container">
    
    <div class="card">
        <div class="card-header"><span class="card-title">Cargar Nueva Nota</span></div>
        <div class="card-body">
            
            {% if estado == 'exito' %}
            <div style="background:#e8f5e9; color:#2e7d32; padding:12px; border-radius:6px; margin-bottom:20px; font-weight:600;">
                ✅ La nota se ha guardado correctamente.
            </div>
            {% endif %}

            <form action="/notas/guardar" method="POST" style="display:flex; flex-direction:column; gap:16px;">
                
                <div>
                    <label style="font-weight:600; font-size:14px; color:#374151; display:block; margin-bottom:6px;">ID del Curso:</label>
                    <input type="number" name="curso_id" class="form-input" style="width:100%" required>
                </div>

                <div>
                    <label style="font-weight:600; font-size:14px; color:#374151; display:block; margin-bottom:6px;">ID de la Evaluación:</label>
                    <input type="number" name="id_evaluacion" class="form-input" style="width:100%" required>
                </div>

                <div>
                    <label style="font-weight:600; font-size:14px; color:#374151; display:block; margin-bottom:6px;">Padrón / Equipo:</label>
                    <input type="number" name="padron" class="form-input" style="width:100%" required>
                </div>

                <div>
                    <label style="font-weight:600; font-size:14px; color:#374151; display:block; margin-bottom:6px;">Puntaje (Nota):</label>
                    <input type="number" step="0.1" name="puntaje" class="form-input" style="width:100%" required>
                </div>

                <div style="margin-top:10px;">
                    <button type="submit" class="btn btn-primary" style="width:100%">💾 Guardar Nota</button>
                </div>
            </form>
            
        </div>
    </div>

</div>
{% endblock %}
