<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistencia — AcademiQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}"/>
  <style>
    .att-row { display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0; }
    .att-row:last-child { border-bottom:none; }
    .att-dot { width:12px;height:12px;border-radius:50%;flex-shrink:0; }
    .att-present { background:#2e7d32; }
    .att-absent  { background:#c62828; }
  </style>
</head>
<body>

<div class="public-shell">
  <header class="public-topbar">
    <div class="public-topbar-logo"><span>🎓</span> AcademiQ</div>
    <nav class="public-topbar-nav">
      <a href="alumno-inicio.html">Inicio</a>
      <a href="alumno-notas.html">Mis Notas</a>
      <a href="alumno-grupos.html">Mi Grupo</a>
      <a href="alumno-asistencia.html" class="active">Asistencia</a>
    </nav>
  </header>

  <div class="public-container">
    <!-- Buscador -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap;padding:16px 20px">
        <input class="form-input" id="padron-input" placeholder="Tu padrón" style="flex:1;min-width:130px" />
      </div>
    </div>

    <!-- Registrar asistencia con código QR -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header"><span class="card-title">Registrar asistencia</span></div>
      <div class="card-body">
        <form action="{{ url_for('registrar_asistencia') }}" method="post">
          <input type="hidden" name="token" value="{{ token }}" />
          <input class="form-input" name="padron" placeholder="Tu padrón" style="margin-bottom:12px" required />
          <button type="submit" class="btn btn-accent">Registrar presente</button>
        </form>
        {% if mensaje %}
          <div class="alert alert-{{ 'success' if exito else 'danger' }}" style="margin-top:12px">{{ mensaje }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>

<script type="module">
import api from '../js/api.js';
import { buscarAlumno } from '../js/alumno.js';
import { formatDate, toast } from '../js/utils.js';

let currenStudent = null;
let cursoId = '';
let padron = '';
let allSessions = [];

async function loadCourses() {
  const res = await api.filter('Course', { estado: 'activo' });
  const courses = res.results || [];
  const sel = document.getElementById('curso-select');
  courses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = `${c.nombre} (${c.codigo})`;
    sel.appendChild(opt);
  });
  const savedCurso = localStorage.getItem('alumno_curso');
  if (savedCurso) sel.value = savedCurso;
  document.getElementById('padron-input').value = localStorage.getItem('alumno_padron') || '';
  if (savedCurso) buscar();
}

window.buscar = async () => {
  padron  = document.getElementById('padron-input').value.trim();
  cursoId = document.getElementById('curso-select').value;
  if (!padron || !cursoId) return;
  localStorage.setItem('alumno_padron', padron);
  localStorage.setItem('alumno_curso', cursoId);

  const { student, attendances } = await buscarAlumno(cursoId, padron);
  currenStudent = student;

  const sessRes = await api.filter('AttendanceSession', { curso_id: cursoId });
  allSessions = sessRes.results || [];

  document.getElementById('history-section').style.display = 'block';

  const totalClasses = allSessions.length;
  const presente = attendances.filter(a => a.presente).length;
  const ausente = totalClasses - presente;
  const pct = totalClasses ? Math.round((presente / totalClasses) * 100) : 0;

  document.getElementById('stat-present').textContent = presente;
  document.getElementById('stat-absent').textContent = ausente;
  document.getElementById('stat-pct').textContent = `${pct}%`;

  const attByDate = {};
  attendances.forEach(a => { attByDate[a.fecha] = a; });

  const sortedSessions = [...allSessions].sort((a, b) => b.fecha.localeCompare(a.fecha));

  const attList = document.getElementById('att-list');
  if (!sortedSessions.length) {
    attList.innerHTML = '<p style="color:#9ca3af;text-align:center">Sin clases registradas</p>';
    return;
  }

  attList.innerHTML = sortedSessions.map(s => {
    const att = attByDate[s.fecha];
    const isPresent = att?.presente;
    return `
      <div class="att-row">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="att-dot ${isPresent ? 'att-present' : 'att-absent'}"></div>
          <span style="font-size:14px;font-weight:500">${formatDate(s.fecha)}</span>
        </div>
        <span class="badge ${isPresent ? 'badge-success' : 'badge-danger'}">
          ${isPresent ? '✅ Presente' : '❌ Ausente'}
        </span>
      </div>
    `;
  }).join('');
};

window.registrarAsistencia = async () => {
  const code    = document.getElementById('qr-code-input').value.trim().toUpperCase();
  cursoId = document.getElementById('curso-select').value;
  padron  = document.getElementById('padron-input').value.trim();

  if (!code || !cursoId || !padron) {
    showMsg('Completá todos los campos', 'error');
    return;
  }

  const today = new Date().toISOString().split('T')[0];

  // Verificar que exista una sesión activa con ese hash
  const sessRes = await api.filter('AttendanceSession', { curso_id: cursoId, activa: true });
  const sessions = sessRes.results || [];
  const session  = sessions.find(s => s.qr_hash?.toUpperCase().includes(code) || s.qr_hash?.toUpperCase() === code);

  if (!session) {
    showMsg('❌ Código inválido o sesión expirada', 'error');
    return;
  }

  // Verificar si ya registró
  const existRes = await api.filter('Attendance', { curso_id: cursoId, padron, fecha: today });
  if (existRes.results?.length > 0) {
    showMsg('✅ Ya registraste tu asistencia hoy', 'success');
    return;
  }

  await api.create('Attendance', {
    curso_id: cursoId, padron, fecha: today,
    presente: true, session_id: session.id,
  });

  showMsg('✅ ¡Asistencia registrada con éxito!', 'success');
  document.getElementById('qr-code-input').value = '';
  if (padron && cursoId) buscar();
};

function showMsg(msg, type) {
  const el = document.getElementById('att-result-msg');
  el.innerHTML = `<div class="alert alert-${type === 'success' ? 'success' : 'danger'}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

loadCourses();
</script>
</body>
</html>
