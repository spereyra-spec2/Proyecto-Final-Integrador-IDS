<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registrar Asistencia</title>
</head>
<body>
    <h1>Registrar Asistencia</h1>
    
    <form id="formulario">
        <label for="padron">Padrón:</label><br>
        <input type="number" id="padron" name="padron" required><br><br>
        
        <button type="submit">Confirmar Asistencia</button>
    </form>
    
    <div id="mensaje"></div>
    
    <script>
        const form = document.getElementById('formulario');
        const mensajeDiv = document.getElementById('mensaje');
        const token = '{{ token }}';
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const padron = document.getElementById('padron').value;
            
            mensajeDiv.innerHTML = 'Procesando...';
            
            try {
                const response = await fetch('/api/asistencia/confirmar-asistencia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        padron: parseInt(padron), 
                        token: token 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    mensajeDiv.innerHTML = '✓ ' + (data.mensaje || 'Asistencia registrada');
                    mensajeDiv.style.color = 'green';
                    form.style.display = 'none';
                } else {
                    const errorMsg = data.error ? data.error[0].message : 'Error desconocido';
                    mensajeDiv.innerHTML = '✗ ' + errorMsg;
                    mensajeDiv.style.color = 'red';
                }
            } catch (error) {
                mensajeDiv.innerHTML = '✗ Error de conexión';
                mensajeDiv.style.color = 'red';
            }
        });
    </script>
</body>
</html>
