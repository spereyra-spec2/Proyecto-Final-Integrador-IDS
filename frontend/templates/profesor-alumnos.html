<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumnos — AcademiQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
</head>
<body>

<div class="sidebar-overlay"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🎓</div>
    <div>
      <div class="sidebar-logo-text">AcademiQ</div>
      <div class="sidebar-logo-sub">Panel Docente</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <a class="nav-item" href="profesor-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="profesor-cursos.html"><span class="nav-icon">📚</span> Mis Cursos</a>
    <div class="nav-section-label">Curso actual</div>
    <a class="nav-item active" href="#"><span class="nav-icon">👥</span> Alumnos</a>
    <a class="nav-item" id="nav-equipos" href="#"><span class="nav-icon">🤝</span> Equipos</a>
    <a class="nav-item" id="nav-evals" href="#"><span class="nav-icon">📝</span> Evaluaciones</a>
    <a class="nav-item" id="nav-asist" href="#"><span class="nav-icon">✅</span> Asistencia</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> Cerrar sesión</a>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <button class="hamburger">☰</button>
    <span class="topbar-title" id="topbar-title">Alumnos</span>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Alumnos</h1>
        <p class="page-subtitle" id="course-name-sub">Cargando curso...</p>
      </div>
      <div class="page-actions">
        <form id="csv-form" method="POST" action="/importar-alumnos" enctype="multipart/form-data" style="display:inline-block">
          <input type="file" name="file" id="csv-file" accept=".csv" style="display:none" />
          <input type="hidden" name="curso_id" value="{{ request.args.get('curso') or '' }}" />
        </form>
        <button class="btn btn-outline" id="btn-csv" onclick="document.getElementById('csv-file').click()">📥 Importar CSV</button>
        <button class="btn btn-primary" onclick="openModal('modal-student')">➕ Agregar alumno</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap;padding:14px 18px">
        <input class="form-input" id="search" placeholder="🔍 Buscar por nombre o padrón..." style="flex:1;min-width:200px" />
        <select class="form-select" id="filter-estado" style="width:160px">
          <option value="">Todos</option>
          <option value="activo">Activos</option>
          <option value="abandono">Abandonó</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-body" style="padding:0">
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Nombre</th><th>Padrón</th><th>Email</th><th>DNI</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="students-tbody"><tr><td colspan="6" style="text-align:center;padding:30px;color:#9ca3af">Cargando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal alumno -->
<div class="modal-overlay hidden" id="modal-student">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-student-title">Nuevo alumno</span>
      <button class="modal-close" onclick="closeModal('modal-student')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nombre completo *</label><input class="form-input" id="s-nombre" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group"><label class="form-label">Padrón *</label><input class="form-input" id="s-padron" /></div>
        <div class="form-group"><label class="form-label">DNI</label><input class="form-input" id="s-dni" /></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="s-email" type="email" /></div>
      <div class="form-group" id="s-estado-group" style="display:none">
        <label class="form-label">Estado</label>
        <select class="form-select" id="s-estado">
          <option value="activo">Activo</option>
          <option value="abandono">Abandonó</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-student')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-student">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import api from '/static/js/api.js';
import { toast, openModal, closeModal, initSidebar } from '/static/js/utils.js';

initSidebar();
window.openModal = openModal;
window.closeModal = closeModal;

const params = new URLSearchParams(window.location.search);
const cursoId = params.get('curso') || '';

// Actualizar links del sidebar
document.getElementById('nav-equipos').href = `profesor-equipos.html?curso=${cursoId}`;
document.getElementById('nav-evals').href = `profesor-evaluaciones.html?curso=${cursoId}`;
document.getElementById('nav-asist').href = `profesor-asistencia.html?curso=${cursoId}`;

let students = [];
let editingId = null;

async function loadCourse() {
  if (!cursoId) return;
  const c = await api.get('Course', cursoId);
  document.getElementById('course-name-sub').textContent = `${c.nombre} · ${c.codigo}`;
  document.getElementById('topbar-title').textContent = `Alumnos — ${c.nombre}`;
}

async function load() {
  const res = await api.filter('Student', { curso_id: cursoId });
  students = res.results || [];
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const estado = document.getElementById('filter-estado').value;
  const tbody = document.getElementById('students-tbody');

  let filtered = students.filter(s => {
    const matchSearch = !search || s.nombre?.toLowerCase().includes(search) || s.padron?.includes(search);
    const matchEstado = !estado || s.estado === estado;
    return matchSearch && matchEstado;
  });

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:#9ca3af">Sin alumnos</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td><strong>${s.nombre}</strong></td>
      <td>${s.padron}</td>
      <td style="color:#6b7280">${s.email || '—'}</td>
      <td style="color:#6b7280">${s.dni || '—'}</td>
      <td><span class="badge ${s.estado === 'activo' ? 'badge-success' : 'badge-danger'}">${s.estado}</span></td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="editStudent('${s.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="bajaStudent('${s.id}')" style="margin-left:4px">⬇️</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-estado').addEventListener('change', render);

window.editStudent = (id) => {
  const s = students.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('s-nombre').value = s.nombre || '';
  document.getElementById('s-padron').value = s.padron || '';
  document.getElementById('s-dni').value = s.dni || '';
  document.getElementById('s-email').value = s.email || '';
  document.getElementById('s-estado').value = s.estado || 'activo';
  document.getElementById('s-estado-group').style.display = 'block';
  document.getElementById('modal-student-title').textContent = 'Editar alumno';
  openModal('modal-student');
};

window.bajaStudent = async (id) => {
  if (!confirm('¿Dar de baja a este alumno?')) return;
  await api.update('Student', id, { estado: 'abandono' });
  toast('Alumno dado de baja', 'success');
  load();
};

document.getElementById('btn-save-student').addEventListener('click', async () => {
  const nombre = document.getElementById('s-nombre').value.trim();
  const padron = document.getElementById('s-padron').value.trim();
  const dni    = document.getElementById('s-dni').value.trim();
  const email  = document.getElementById('s-email').value.trim();
  const estado = document.getElementById('s-estado').value;

  if (!nombre || !padron) { toast('Nombre y padrón son requeridos', 'error'); return; }

  if (editingId) {
    await api.update('Student', editingId, { nombre, padron, dni, email, estado });
    toast('Alumno actualizado', 'success');
  } else {
    await api.create('Student', { nombre, padron, dni, email, estado: 'activo', curso_id: cursoId });
    toast('Alumno registrado', 'success');
  }

  editingId = null;
  document.getElementById('s-estado-group').style.display = 'none';
  document.getElementById('modal-student-title').textContent = 'Nuevo alumno';
  closeModal('modal-student');
  ['s-nombre','s-padron','s-dni','s-email'].forEach(id => document.getElementById(id).value = '');
  load();
});

loadCourse();
load();
</script>
</body>
</html>
