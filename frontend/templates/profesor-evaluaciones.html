<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluaciones — AcademiQ</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

<div class="sidebar-overlay"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🎓</div>
    <div><div class="sidebar-logo-text">AcademiQ</div><div class="sidebar-logo-sub">Panel Docente</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <a class="nav-item" href="profesor-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="profesor-cursos.html"><span class="nav-icon">📚</span> Mis Cursos</a>
    <div class="nav-section-label">Curso actual</div>
    <a class="nav-item" id="nav-alumnos" href="#"><span class="nav-icon">👥</span> Alumnos</a>
    <a class="nav-item" id="nav-equipos" href="#"><span class="nav-icon">🤝</span> Equipos</a>
    <a class="nav-item active" href="#"><span class="nav-icon">📝</span> Evaluaciones</a>
    <a class="nav-item" id="nav-asist" href="#"><span class="nav-icon">✅</span> Asistencia</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> Cerrar sesión</a>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <button class="hamburger">☰</button>
    <span class="topbar-title" id="topbar-title">Evaluaciones</span>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Evaluaciones</h1>
        <p class="page-subtitle" id="course-sub">Cargando...</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('modal-eval')">➕ Nueva evaluación</button>
    </div>

    <div id="evals-list">
      <p style="text-align:center;padding:40px;color:#9ca3af">Cargando...</p>
    </div>
  </div>
</div>

<!-- Modal nueva evaluación -->
<div class="modal-overlay hidden" id="modal-eval">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva evaluación</span>
      <button class="modal-close" onclick="closeModal('modal-eval')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nombre *</label><input class="form-input" id="e-nombre" placeholder="Ej: Primer Parcial" /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="e-tipo">
            <option value="parcial">Parcial</option>
            <option value="parcialito">Parcialito</option>
            <option value="trabajo_practico">Trabajo Práctico</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Fecha</label><input class="form-input" id="e-fecha" type="date" /></div>
      </div>
      <div class="form-group"><label class="form-label">Descripción</label><input class="form-input" id="e-desc" placeholder="Opcional" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-eval')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-eval">Crear</button>
    </div>
  </div>
</div>

<!-- Modal cargar notas -->
<div class="modal-overlay hidden" id="modal-grades">
  <div class="modal" style="max-width:660px">
    <div class="modal-header">
      <span class="modal-title" id="grades-modal-title">Calificaciones</span>
      <button class="modal-close" onclick="closeModal('modal-grades')">✕</button>
    </div>
    <div class="modal-body" style="padding:0">
      <div class="table-wrapper">
        <table class="table" id="grades-table">
          <thead><tr><th>Alumno</th><th>Padrón</th><th>Nota</th><th>Acción</th></tr></thead>
          <tbody id="grades-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
import api from '../js/api.js';
import { toast, openModal, closeModal, formatDate, initSidebar } from '../js/utils.js';

initSidebar();
window.openModal = openModal;
window.closeModal = closeModal;

const params = new URLSearchParams(window.location.search);
const cursoId = params.get('curso') || '';

document.getElementById('nav-alumnos').href = `profesor-alumnos.html?curso=${cursoId}`;
document.getElementById('nav-equipos').href = `profesor-equipos.html?curso=${cursoId}`;
document.getElementById('nav-asist').href = `profesor-asistencia.html?curso=${cursoId}`;

let students = [];
let grades = [];
let currentEvalId = null;

const tipoLabel = { parcial: 'Parcial', parcialito: 'Parcialito', trabajo_practico: 'Trabajo Práctico' };
const tipoBadge = { parcial: 'badge-info', parcialito: 'badge-neutral', trabajo_practico: 'badge-warning' };

async function init() {
  const [courseData, studentsRes] = await Promise.all([
    api.get('Course', cursoId),
    api.filter('Student', { curso_id: cursoId, estado: 'activo' }),
  ]);
  document.getElementById('course-sub').textContent = `${courseData.nombre} · ${courseData.codigo}`;
  document.getElementById('topbar-title').textContent = `Evaluaciones — ${courseData.nombre}`;
  students = studentsRes.results || [];
  loadEvals();
}

async function loadEvals() {
  const res = await api.filter('Evaluation', { curso_id: cursoId });
  const evals = res.results || [];
  const gradesRes = await api.filter('Grade', { curso_id: cursoId });
  grades = gradesRes.results || [];

  const container = document.getElementById('evals-list');
  if (!evals.length) {
    container.innerHTML = `<div style="text-align:center;padding:50px;color:#9ca3af"><div style="font-size:40px;margin-bottom:12px">📝</div><strong>Sin evaluaciones</strong></div>`;
    return;
  }

  container.innerHTML = evals.map(ev => {
    const evGrades = grades.filter(g => g.evaluacion_id === ev.id);
    const avg = evGrades.length ? (evGrades.reduce((s, g) => s + g.nota, 0) / evGrades.length).toFixed(1) : '—';
    return `
      <div class="card" style="margin-bottom:14px">
        <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div style="display:flex;align-items:center;gap:12px">
            <strong style="font-size:16px">${ev.nombre}</strong>
            <span class="badge ${tipoBadge[ev.tipo] || 'badge-neutral'}">${tipoLabel[ev.tipo] || ev.tipo}</span>
            ${ev.fecha ? `<span style="font-size:13px;color:#6b7280">${formatDate(ev.fecha)}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:14px;color:#6b7280">Promedio: <strong>${avg}</strong> (${evGrades.length}/${students.length})</span>
            <button class="btn btn-primary btn-sm" onclick="openGrades('${ev.id}', '${ev.nombre.replace(/'/g,"\\'")}')">📊 Ver notas</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

window.openGrades = async (evalId, evalName) => {
  currentEvalId = evalId;
  document.getElementById('grades-modal-title').textContent = `Notas — ${evalName}`;
  renderGradesTable();
  openModal('modal-grades');
};

function renderGradesTable() {
  const tbody = document.getElementById('grades-tbody');
  tbody.innerHTML = students.map(s => {
    const g = grades.find(x => x.padron === s.padron && x.evaluacion_id === currentEvalId);
    return `
      <tr id="row-${s.padron}">
        <td>${s.nombre}</td>
        <td>${s.padron}</td>
        <td>
          <input type="number" min="0" max="10" step="0.5" class="form-input" 
            style="width:80px;padding:6px 10px" 
            id="nota-${s.padron}" value="${g ? g.nota : ''}" 
            placeholder="—" />
        </td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="saveGrade('${s.padron}', '${g ? g.id : ''}')">💾</button>
        </td>
      </tr>
    `;
  }).join('');
}

window.saveGrade = async (padron, existingId) => {
  const val = parseFloat(document.getElementById(`nota-${padron}`).value);
  if (isNaN(val)) { toast('Ingresá una nota válida', 'error'); return; }

  if (existingId) {
    await api.update('Grade', existingId, { nota: val });
  } else {
    const g = await api.create('Grade', {
      curso_id: cursoId, evaluacion_id: currentEvalId,
      padron, nota: val, tipo_carga: 'individual'
    });
    document.querySelector(`#row-${padron} button`).setAttribute('onclick', `saveGrade('${padron}', '${g.id}')`);
    grades.push(g);
  }
  toast('Nota guardada', 'success');
};

document.getElementById('btn-save-eval').addEventListener('click', async () => {
  const nombre = document.getElementById('e-nombre').value.trim();
  if (!nombre) { toast('El nombre es requerido', 'error'); return; }
  await api.create('Evaluation', {
    curso_id: cursoId,
    nombre,
    tipo: document.getElementById('e-tipo').value,
    fecha: document.getElementById('e-fecha').value || null,
    descripcion: document.getElementById('e-desc').value.trim(),
  });
  toast('Evaluación creada', 'success');
  closeModal('modal-eval');
  ['e-nombre','e-fecha','e-desc'].forEach(id => document.getElementById(id).value = '');
  loadEvals();
});

init();
</script>
</body>
</html>
