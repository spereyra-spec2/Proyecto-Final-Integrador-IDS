{% extends "base_profesores.html" %}
{% block title %}Evaluaciones — AcademiQ{% endblock %}
{% block content %}

<div class="main-content">
  <div class="topbar">
    <button class="hamburger">☰</button>
    <span class="topbar-title" id="topbar-title">Evaluaciones</span>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Evaluaciones</h1>
        <p class="page-subtitle" id="course-sub">Cargando...</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('modal-eval')">➕ Nueva evaluación</button>
    </div>

    <div id="evals-list">
      <div class="loading-spinner-container" style="text-align:center;padding:40px">
        <div class="loading-spinner"></div>
        <p style="margin-top:16px;color:var(--color-text-light)">Cargando evaluaciones...</p>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="modal-eval">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nueva evaluación</span>
      <button class="modal-close" onclick="closeModal('modal-eval')">✕</button>
    </div>
    <form action="{{url_for('evaluaciones')}}" method="POST">
      <div class="modal-body">
        <label for="tipo">Tipo:</label>
        <input type="text" id="tipo" name="tipo" required>
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion"></textarea>
        <label for="fecha">Fecha y hora:</label>
        <input type="datetime-local" id="fecha" name="fecha" required>        
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary">Crear evaluación</button>
      </div>
</div>
<script src="{{ url_for('static', filename='js/evaluaciones.js') }}"></script>
{% endblock %}
