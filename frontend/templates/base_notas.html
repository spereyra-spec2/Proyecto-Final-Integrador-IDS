<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    
    <title>{% block title %} Gestión de Notas | AcademiQ {% endblock %}</title>

</head>
<body style="background-color: #f9fafb; min-height: 100vh; display: flex; flex-direction: column;">

    <header class="public-topbar admin-topbar" style="display: flex; justify-content: space-between; padding: 15px 30px; align-items: center;">
        <div class="public-topbar-logo" style="font-size: 20px; font-weight: 800;">
            <span>👨‍🏫</span> AcademiQ <span style="font-weight: 400; font-size: 16px; margin-left: 8px;">| Panel Docente</span>
        </div>
        
        <nav class="public-topbar-nav" style="display: flex; gap: 20px;">
            <a href="/notas/cargar" id="nav-cargar">Cargar Notas</a>
            <a href="/notas/ver" id="nav-ver" class="active">Buscar / Editar Notas</a>
        </nav>
    </header>
        
    <main style="flex-grow: 1; padding: 40px 20px;">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/notas_ui.js') }}"></script>


</body>
</html>
