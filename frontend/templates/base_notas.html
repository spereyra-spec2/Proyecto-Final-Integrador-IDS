<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AcademiQ{% endblock %}</title>
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
  
  {% block extra_styles %}{% endblock %}
</head>
<body>

<div class="public-shell">
  <header class="public-topbar">
    <div class="public-topbar-logo"><span>🎓</span> AcademiQ</div>
    <nav class="public-topbar-nav">
      <a href="/alumno-inicio">Inicio</a>
      <a href="/notas/ver" class="active">Mis Notas</a>
      <a href="/alumno-grupos">Mi Grupo</a>
      <a href="/alumno-asistencia">Asistencia</a>
    </nav>
  </header>

  <div class="public-container">
      
      {% block content %}{% endblock %}
      
  </div>
</div>

<script src="{{ url_for('static', filename='js/main_ui.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
