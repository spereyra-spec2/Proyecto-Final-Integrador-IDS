<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <title>{% block title %} AcademiQ - Profesores {% endblock %}</title>
</head>

<body>
<!-- Barra lateral -->
<div class="sidebar-overlay"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🎓</div>
    <div><div class="sidebar-logo-text">AcademiQ</div><div class="sidebar-logo-sub">Panel Docente</div></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <a class="nav-item" href="profesor-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="profesor-cursos.html"><span class="nav-icon">📚</span> Mis Cursos</a>
    <div class="nav-section-label">Curso actual</div>
    <a class="nav-item" id="nav-alumnos" href="#"><span class="nav-icon">👥</span> Alumnos</a>
    <a class="nav-item" id="nav-equipos" href="#"><span class="nav-icon">🤝</span> Equipos</a>
    <a class="nav-item" id="nav-evals" href="#"><span class="nav-icon">📝</span> Evaluaciones</a>
    <a class="nav-item active" href="#"><span class="nav-icon">✅</span> Asistencia</a>
  </nav>
  <div class="sidebar-footer">
    <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> Cerrar sesión</a>
  </div>
</aside>
</body>


<div class="main-content">
  <div class="topbar">
    <button class="hamburger">☰</button>
    <span class="topbar-title">{% block topbar_titulo %}{% endblock %}</span>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">{% block menu_titulo %}{% endblock %}</h1>
        <p class="page-subtitle" id="course-sub">Cargando...</p>
      </div>
        <button class="btn btn-primary" id="btn-generate-qr">{% block menu_accion_btn %}{% endblock %}</button>
    </div>

    {% block content %}{% endblock %}
</div>
