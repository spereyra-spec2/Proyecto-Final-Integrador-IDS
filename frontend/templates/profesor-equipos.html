<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipos — AcademiQ</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/layout.css" />
</head>
<body>

<div class="sidebar-overlay"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🎓</div>
    <div><div class="sidebar-logo-text">AcademiQ</div><div class="sidebar-logo-sub">Panel Docente</div></div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">General</div>
    <a class="nav-item" href="profesor-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-item" href="profesor-cursos.html"><span class="nav-icon">📚</span> Mis Cursos</a>
    <div class="nav-section-label">Curso actual</div>
    <a class="nav-item" id="nav-alumnos" href="#"><span class="nav-icon">👥</span> Alumnos</a>
    <a class="nav-item active" href="#"><span class="nav-icon">🤝</span> Equipos</a>
    <a class="nav-item" id="nav-evals" href="#"><span class="nav-icon">📝</span> Evaluaciones</a>
    <a class="nav-item" id="nav-asist" href="#"><span class="nav-icon">✅</span> Asistencia</a>
  </nav>

  <div class="sidebar-footer">
    <a class="nav-item" href="login.html"><span class="nav-icon">🚪</span> Cerrar sesión</a>
  </div>
</aside>

<div class="main-content">
  <div class="topbar">
    <button class="hamburger">☰</button>
    <span class="topbar-title">Equipos</span>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Equipos</h1>
        <p class="page-subtitle" id="course-sub">Cargando...</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('modal-team')">➕ Nuevo equipo</button>
    </div>

    <div class="grid-3" id="teams-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af">Cargando...</div>
    </div>
  </div>
</div>

<!-- Modal crear equipo -->
<div class="modal-overlay hidden" id="modal-team">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nuevo equipo</span>
      <button class="modal-close" onclick="closeModal('modal-team')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nombre del equipo *</label>
        <input class="form-input" id="t-nombre" placeholder="Ej: Grupo 1" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-team')">Cancelar</button>
      <button class="btn btn-primary" id="btn-create-team">Crear</button>
    </div>
  </div>
</div>

<!-- Modal agregar integrante -->
<div class="modal-overlay hidden" id="modal-member">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="member-modal-title">Agregar integrante</span>
      <button class="modal-close" onclick="closeModal('modal-member')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Padrón del alumno</label>
        <input class="form-input" id="m-padron" placeholder="Ej: 108542" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-member')">Cancelar</button>
      <button class="btn btn-primary" id="btn-add-member">Agregar</button>
    </div>
  </div>
</div>

<script type="module">
import { toast, openModal, closeModal, initSidebar } from '../js/utils.js';

const API_URL = "http://127.0.0.1:5001";

initSidebar();
window.openModal = openModal;
window.closeModal = closeModal;

const params = new URLSearchParams(window.location.search);
const cursoId = params.get('curso') || '';

document.getElementById('nav-alumnos').href = `profesor-alumnos.html?curso=${cursoId}`;

let teams = [];
let currentTeamId = null;

async function init() {
  try {
    const res = await fetch(`${API_URL}/api/cursos/${cursoId}/equipos`);
    if (!res.ok) throw new Error(res.status);

    teams = await res.json();

    document.getElementById('course-sub').textContent = `Curso ${cursoId}`;

    render();
  } catch (err) {
    console.error(err);
    document.getElementById('teams-grid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:40px;color:red">
        Error cargando equipos
      </div>`;
  }
}

function render() {
  const grid = document.getElementById('teams-grid');

  if (!teams.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:50px;color:#9ca3af">
        <div style="font-size:40px;margin-bottom:12px">🤝</div>
        <strong>Sin equipos</strong>
      </div>`;
    return;
  }

  grid.innerHTML = teams.map(t => `
    <div class="card">
      <div class="card-header" style="display:flex;justify-content:space-between">
        <span class="card-title">${t.nombre}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteTeam(${t.idEquipos})">🗑</button>
      </div>

      <div class="card-body">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <span style="font-size:13px;color:#6b7280">
            Código: <strong style="font-family:monospace">${t.codigo_acceso || ''}</strong>
          </span>
          <span class="badge badge-info">${(t.integrantes||[]).length}</span>
        </div>

        ${(t.integrantes||[]).length === 0
          ? `<p style="font-size:13px;color:#9ca3af">Sin integrantes</p>`
          : t.integrantes.map(p => `
              <div style="display:flex;justify-content:space-between;padding:7px 10px;background:#f7f9fc;border-radius:6px;margin-bottom:5px">
                <div>
                  <strong>${p.nombre}</strong>
                  <span style="color:#9ca3af">(${p.padron})</span>
                </div>
              </div>
            `).join('')
        }

        <button class="btn btn-outline btn-sm"
          onclick="addMember(${t.idEquipos}, '${t.nombre}')">
          ➕ Agregar integrante
        </button>
      </div>
    </div>
  `).join('');
}

window.deleteTeam = async (id) => {
  if (!confirm('¿Eliminar este equipo?')) return;

  await fetch(`${API_URL}/api/cursos/${cursoId}/equipos/${id}`, {
    method: 'DELETE'
  });

  init();
};

window.addMember = (teamId, name) => {
  currentTeamId = teamId;
  document.getElementById('member-modal-title').textContent = `Agregar a ${name}`;
  openModal('modal-member');
};

document.getElementById('btn-create-team').addEventListener('click', async () => {
  const nombre = document.getElementById('t-nombre').value.trim();
  if (!nombre) return toast('Nombre requerido', 'error');

  const padrones = prompt('Padrones separados por coma')
    ?.split(',')
    .map(p => parseInt(p.trim()))
    .filter(Boolean);

  await fetch(`${API_URL}/api/cursos/${cursoId}/equipos`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ nombre, padrones })
  });

  closeModal('modal-team');
  init();
});

init();
</script>

</body>
</html>
