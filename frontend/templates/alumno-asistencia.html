{% extends 'base_general.html' %}

{% block title %}Asistencia — AcademiQ{% endblock %}
{% block active_asistencia %}active{% endblock %}

{% block extra_css %}
  <style>
    .att-row { display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0; }
    .att-row:last-child { border-bottom:none; }
    .att-dot { width:12px;height:12px;border-radius:50%;flex-shrink:0; }
    .att-present { background:#2e7d32; }
    .att-absent  { background:#c62828; }
  </style>
{% endblock %}

{% block content %}
  <div class="public-container">
    <div class="card" style="margin-bottom:24px">
      <div class="card-header"><span class="card-title">Registrar asistencia</span></div>
      <div class="card-body">
        
        <form action="{{ url_for('asistencia.registrar_asistencia') }}" method="post">
          <input type="hidden" name="token" value="{{ token }}" />
          <input type="number" class="form-input" name="padron" placeholder="Tu padrón" style="margin-bottom:12px" required />
          <button type="submit" class="btn btn-accent">Registrar presente</button>
        </form>

        {% if mensaje %}
          <div class="alert alert-{{ 'success' if exito else 'danger' }}" style="margin-top:12px">
            {{ mensaje }}
          </div>
        {% endif %}

      </div>
    </div>
  </div>
{% endblock %}
